name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git remote add hf https://Farseen-Farseen:${HF_TOKEN}@huggingface.co/spaces/Farseen-Farseen/malayalam-pdf-translator 2>/dev/null || true

          # HF Spaces rejects binary files pushed via plain git.
          # FreeSans fonts are already installed on HF via packages.txt
          # (fonts-freefont-ttf). Create a deploy branch without fonts.
          git checkout -b hf-deploy
          git rm -r --cached fonts/ --ignore-unmatch
          git commit -m "ci: exclude fonts (installed via packages.txt on HF)" --allow-empty

          git push hf hf-deploy:main --force
