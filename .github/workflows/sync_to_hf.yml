name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face Spaces (orphan — no binary history)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git remote add hf https://Farseen-Farseen:${HF_TOKEN}@huggingface.co/spaces/Farseen-Farseen/malayalam-pdf-translator

          # Create an orphan branch so HF never sees font files in any commit.
          # Fonts are installed on HF via packages.txt (fonts-freefont-ttf).
          git checkout --orphan hf-deploy
          git rm -rf fonts/
          git add -A
          git commit -m "Deploy: $(git log origin/main -1 --format='%s')"

          git push hf hf-deploy:main --force
